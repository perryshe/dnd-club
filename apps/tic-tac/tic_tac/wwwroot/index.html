<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; padding: 10px; }
        .container { display: flex; gap: 20px; max-width: 800px; width: 100%; justify-content: center; }
        .game-column { display: flex; flex-direction: column; align-items: center; }
        .leaderboard-column { min-width: 260px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; max-height: 400px; overflow-y: auto; }
        .leaderboard-column h2 { font-size: 1rem; margin-bottom: 10px; color: #fbbf24; text-align: center; }
        .leaderboard-column table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .leaderboard-column th { text-align: left; color: #94a3b8; padding: 4px 6px; border-bottom: 1px solid #334155; font-weight: 600; }
        .leaderboard-column td { padding: 4px 6px; border-bottom: 1px solid #1e293b; }
        .leaderboard-column .highlight { background: rgba(251, 191, 36, 0.1); }
        .leaderboard-column .rank { color: #64748b; width: 20px; }
        .leaderboard-column .login { color: #e2e8f0; }
        .leaderboard-column .num { color: #94a3b8; text-align: center; }
        .leaderboard-column .wins { color: #4ade80; }
        .leaderboard-column .losses { color: #f87171; }
        .leaderboard-column .draws { color: #fbbf24; }
        h1 { font-size: 1.25rem; margin-bottom: 10px; }
        .auth-section { margin-bottom: 10px; text-align: center; min-height: 36px; }
        .auth-section button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 6px 14px; font-size: 0.7rem; border-radius: 6px; cursor: pointer; margin: 0 2px; transition: transform 0.2s; }
        .auth-section button:hover { transform: translateY(-1px); }
        .auth-section .user-info { font-size: 0.75rem; color: #94a3b8; }
        .auth-section .user-info span { color: #4ade80; }
        .game-container { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .board { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 3px; margin-bottom: 10px; }
        .cell { background: rgba(255,255,255,0.15); border: none; border-radius: 6px; font-size: 1.5rem; font-weight: bold; color: #fff; cursor: pointer; transition: all 0.3s ease; }
        .cell:hover:not(.taken) { background: rgba(255,255,255,0.25); transform: scale(1.05); }

        .cell.x { color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
        .cell.o { color: #f87171; text-shadow: 0 0 10px rgba(248, 113, 113, 0.5); }
        .status { font-size: 0.65rem; text-align: center; margin-bottom: 10px; min-height: 16px; }
        .status.win { color: #4ade80; }
        .status.lose { color: #f87171; }
        .status.draw { color: #fbbf24; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 6px 15px; font-size: 0.5rem; border-radius: 14px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        button:disabled { opacity: 0.5; transform: none; }
        .hidden { display: none !important; }
        .menu-buttons { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        .menu-buttons button { font-size: 0.65rem; padding: 8px 16px; }
        .available-title { font-size: 0.75rem; color: #94a3b8; margin: 10px 0 6px; text-align: center; }
        .game-item { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 8px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; }
        .game-item button { padding: 4px 10px; font-size: 0.6rem; }
        .loading { display: inline-block; width: 10px; height: 10px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 600px) { .container { flex-direction: column; align-items: center; } .leaderboard-column { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-column">
            <div class="auth-section" id="authSection">
                <div id="userInfo" class="hidden">
                    <span class="user-info">Playing as: <span id="displayName"></span></span>
                    <button id="logoutBtn" style="margin-left:8px;background:#475569">Logout</button>
                </div>
                <div id="loginPrompt">
                    <span style="font-size:0.75rem;color:#94a3b8">Для игры войдите в d21 Club</span>
                    <a href="/login" target="_top" style="margin-left:6px;font-size:0.65rem">Войти</a>
                </div>
            </div>

            <div id="menuScreen">
                <h1>Tic-Tac-Toe</h1>
                <div class="menu-buttons">
                    <button id="vsComputerBtn">New Game vs Computer</button>
                    <button id="vsPlayerBtn" class="secondary" style="background:linear-gradient(135deg,#475569,#64748b)">New Game vs Player</button>
                </div>
                <div id="availableSection" class="hidden">
                    <div class="available-title">Available Games</div>
                    <div id="availableList"></div>
                </div>
            </div>

            <div id="gameScreen" class="hidden">
                <h1>Tic-Tac-Toe</h1>
                <div style="font-size:0.6rem;color:#64748b;text-align:center;margin-bottom:4px" id="gameId"></div>
                <div class="game-container">
                    <div class="status" id="status">Loading...</div>
                    <div class="board" id="board">
                        <button class="cell" data-index="0"></button>
                        <button class="cell" data-index="1"></button>
                        <button class="cell" data-index="2"></button>
                        <button class="cell" data-index="3"></button>
                        <button class="cell" data-index="4"></button>
                        <button class="cell" data-index="5"></button>
                        <button class="cell" data-index="6"></button>
                        <button class="cell" data-index="7"></button>
                        <button class="cell" data-index="8"></button>
                    </div>
                    <button id="backBtn" style="background:#475569">Back</button>
                </div>
            </div>
        </div>

        <div class="leaderboard-column">
            <h2>&#127942; Leaderboard</h2>
            <table>
                <thead>
                    <tr>
                        <th class="rank">#</th>
                        <th class="login">Player</th>
                        <th class="num wins">W</th>
                        <th class="num losses">L</th>
                        <th class="num draws">D</th>
                        <th class="num">T</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr><td colspan="6" style="text-align:center;color:#64748b;font-size:0.7rem">No games played yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const base = window.location.pathname.replace(/\/$/, '');
        const API_URL = base + '/api/game';
        const AUTH_URL = base + '/api/auth';
        const STATS_URL = base + '/api/stats';

        const TOKEN_KEY = 'tictac_token';
        const LOGIN_KEY = 'tictac_login';

        let gameId = null;
        let currentBoard = null;
        let currentGameType = null;
        let isProcessing = false;
        let token = localStorage.getItem(TOKEN_KEY);
        let currentLogin = localStorage.getItem(LOGIN_KEY);
        let polling = null;

        const statusEl = document.getElementById('status');
        const cells = document.querySelectorAll('.cell');
        const displayName = document.getElementById('displayName');
        const userInfo = document.getElementById('userInfo');
        const loginPrompt = document.getElementById('loginPrompt');
        const menuScreen = document.getElementById('menuScreen');
        const gameScreen = document.getElementById('gameScreen');
        const availableSection = document.getElementById('availableSection');
        const availableList = document.getElementById('availableList');

        function showScreen(screen) {
            [menuScreen, gameScreen].forEach(s => s.classList.toggle('hidden', s.id !== screen + 'Screen'));
        }

        function updateAuthUI() {
            if (token && currentLogin) {
                userInfo.classList.remove('hidden');
                loginPrompt.classList.add('hidden');
                displayName.textContent = currentLogin;
            } else {
                userInfo.classList.add('hidden');
                loginPrompt.classList.remove('hidden');
            }
        }

        function indexToCoords(index) { return { row: Math.floor(index / 3), col: index % 3 }; }

        function renderBoard(board) {
            cells.forEach((cell, index) => {
                const { row, col } = indexToCoords(index);
                const value = board[row][col];
                cell.textContent = value === 1 ? 'X' : value === 2 ? 'O' : '';
                cell.classList.remove('x', 'o', 'taken');
                if (value !== 0) cell.classList.add('taken', value === 1 ? 'x' : 'o');
            });
        }

        function renderStatus(message, type) {
            statusEl.textContent = message;
            statusEl.classList.remove('win', 'lose', 'draw');
            if (type) statusEl.classList.add(type);
        }

        async function apiFetch(url, options = {}) {
            const headers = options.headers || {};
            if (token) headers['Authorization'] = 'Basic ' + token;
            if (options.body && !(options.body instanceof FormData))
                headers['Content-Type'] = 'application/json';
            return fetch(url, { ...options, headers });
        }

        function getSymbol(game, userId) {
            if (game.playerXId === userId) return 1;
            if (game.playerOId === userId) return 2;
            return -1;
        }

        function isMyTurn(game, userId) {
            const symbol = getSymbol(game, userId);
            if (symbol === -1) return false;
            if (game.state === 'PlayerXTurn' && symbol === 1) return true;
            if (game.state === 'PlayerOTurn' && symbol === 2) return true;
            return false;
        }

        function renderGame(game, userId) {
            const state = game.state;
            const gameType = game.gameType;
            const isOver = state === 'PlayerXWin' || state === 'PlayerOWin' || state === 'Draw';
            const myTurn = isMyTurn(game, userId);

            document.getElementById('gameId').textContent = 'Game: ' + game.id;

            if (isOver) {
                if (state === 'PlayerXWin') renderStatus(gameType === 'VsComputer' ? 'Computer wins!' : 'X wins!', gameType === 'VsComputer' ? 'lose' : 'win');
                else if (state === 'PlayerOWin') renderStatus(gameType === 'VsComputer' ? 'You win!' : 'O wins!', gameType === 'VsComputer' ? 'win' : 'lose');
                else renderStatus('Draw!', 'draw');
                if (gameType === 'VsComputer' && state !== 'Draw') {
                    const result = state === 'PlayerOWin' ? 1 : -1;
                    recordResult(result);
                }
                return true;
            } else if (state === 'WaitingForPlayers') {
                renderStatus('Waiting for opponent...');
            } else if (myTurn) {
                renderStatus('Your turn (' + (getSymbol(game, userId) === 1 ? 'X' : 'O') + ')');
            } else {
                renderStatus(gameType === 'VsComputer' ? 'Computer is thinking...' : "Opponent's turn...");
            }

            const board = game.board.board;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    const idx = i * 3 + j;
                    const val = board[i][j];
                    cells[idx].classList.toggle('taken', val !== 0 || isOver || !myTurn || state === 'WaitingForPlayers');
                }
            }
            return false;
        }

        async function makeMove(index) {
            if (isProcessing || !gameId || !token) return;

            const { row, col } = indexToCoords(index);
            if (currentBoard && currentBoard[row][col] !== 0) return;

            isProcessing = true;
            renderStatus('Processing...');

            try {
                const response = await apiFetch(API_URL + '/' + gameId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ row, col })
                });

                if (response.status === 401) { handleSessionExpired(); return; }
                if (!response.ok) {
                    const err = await response.json().catch(() => ({ error: 'Move failed' }));
                    throw new Error(err.error || 'Move failed');
                }

                const game = await response.json();
                currentBoard = game.board.board;
                renderBoard(currentBoard);
                const userId = getUserIdFromToken();
                const done = renderGame(game, userId);
                if (done) { stopPolling(); showScreen('menu'); loadLeaderboard(); }
            } catch (error) {
                renderStatus('Error: ' + error.message);
            } finally {
                isProcessing = false;
            }
        }

        function getUserIdFromToken() {
            return null;
        }

        async function createGame(gameType) {
            if (!token) return;
            isProcessing = true;
            renderStatus('Creating game...');

            try {
                const response = await apiFetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ gameType })
                });
                if (response.status === 401) { handleSessionExpired(); return; }
                if (!response.ok) throw new Error('Failed to create game');
                const game = await response.json();
                openGame(game);
            } catch (error) {
                renderStatus('Error: ' + error.message);
            } finally {
                isProcessing = false;
            }
        }

        function openGame(game) {
            gameId = game.id;
            currentGameType = game.gameType;
            currentBoard = game.board.board;
            renderBoard(currentBoard);
            showScreen('game');

            const userId = getUserIdFromToken();
            const done = renderGame(game, userId);
            if (done) { showScreen('menu'); loadLeaderboard(); return; }

            if (game.gameType === 'VsPlayer') {
                startPolling(game.id);
            }
        }

        function startPolling(id) {
            stopPolling();
            polling = setInterval(async () => {
                const response = await apiFetch(API_URL + '/' + id);
                if (response.status === 401) { handleSessionExpired(); return; }
                if (!response.ok) { stopPolling(); return; }
                const game = await response.json();
                currentBoard = game.board.board;
                renderBoard(currentBoard);
                const userId = getUserIdFromToken();
                const done = renderGame(game, userId);
                if (done) { stopPolling(); showScreen('menu'); loadLeaderboard(); }
            }, 2000);
        }

        function stopPolling() {
            if (polling) { clearInterval(polling); polling = null; }
        }

        async function loadAvailableGames() {
            if (!token) { availableSection.classList.add('hidden'); return; }
            try {
                const response = await apiFetch(API_URL + '/available');
                if (response.status === 401) { handleSessionExpired(); return; }
                if (!response.ok) { availableSection.classList.add('hidden'); return; }
                const data = await response.json();
                if (!data || data.length === 0) { availableSection.classList.add('hidden'); return; }
                availableSection.classList.remove('hidden');
                availableList.innerHTML = data.map(g => `
                    <div class="game-item">
                        <span>${escapeHtml(g.creatorLogin)}</span>
                        <button onclick="joinGame('${g.gameId}')">Join</button>
                    </div>
                `).join('');
            } catch { availableSection.classList.add('hidden'); }
        }

        async function joinGame(id) {
            try {
                const response = await apiFetch(API_URL + '/' + id + '/join', { method: 'POST' });
                if (response.status === 401) { handleSessionExpired(); return; }
                if (!response.ok) { const err = await response.json().catch(() => ({})); renderStatus('Error: ' + (err.error || 'join failed')); return; }
                const game = await response.json();
                openGame(game);
            } catch (err) {
                renderStatus('Error joining game');
            }
        }

        async function recordResult(result) {
            try {
                const res = await apiFetch(STATS_URL + '/record', {
                    method: 'POST',
                    body: JSON.stringify({ result })
                });
                if (res.status === 401) return;
            } catch { }
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch(STATS_URL + '/leaderboard');
                if (!response.ok) return;
                const data = await response.json();
                const tbody = document.getElementById('leaderboardBody');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#64748b;font-size:0.7rem">No games played yet</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map((entry, i) => {
                    const highlight = currentLogin && entry.login === currentLogin ? ' class="highlight"' : '';
                    return `<tr${highlight}>
                        <td class="rank">${i + 1}</td>
                        <td class="login">${escapeHtml(entry.login)}</td>
                        <td class="num wins">${entry.wins}</td>
                        <td class="num losses">${entry.losses}</td>
                        <td class="num draws">${entry.draws}</td>
                        <td class="num">${entry.total}</td>
                    </tr>`;
                }).join('');
            } catch { }
        }

        function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

        function handleSessionExpired() {
            token = null;
            currentLogin = null;
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(LOGIN_KEY);
            updateAuthUI();
            showScreen('menu');
            loadAvailableGames();
            loadLeaderboard();
        }

        document.getElementById('vsComputerBtn').addEventListener('click', () => createGame('VsComputer'));
        document.getElementById('vsPlayerBtn').addEventListener('click', () => createGame('VsPlayer'));
        document.getElementById('backBtn').addEventListener('click', () => { stopPolling(); gameId = null; showScreen('menu'); loadAvailableGames(); });

        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => makeMove(index));
        });

        updateAuthUI();
        (async () => {
            try {
                const res = await fetch('/api/auth/session');
                if (!res.ok) return;
                const session = await res.json();
                if (!session?.user?.name) return;
                const linkRes = await fetch(AUTH_URL + '/auto-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: session.user.name })
                });
                if (!linkRes.ok) return;
                const user = await linkRes.json();
                token = btoa(user.login + ':');
                currentLogin = user.login;
                localStorage.setItem(TOKEN_KEY, token);
                localStorage.setItem(LOGIN_KEY, currentLogin);
                updateAuthUI();
            } catch { }
            if (token) { showScreen('menu'); loadAvailableGames(); }
            loadLeaderboard();
        })();
    </script>
</body>
</html>
