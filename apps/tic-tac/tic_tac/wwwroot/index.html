<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 10px;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 800px;
            width: 100%;
            justify-content: center;
        }

        .game-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .leaderboard-column {
            min-width: 260px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .leaderboard-column h2 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #fbbf24;
            text-align: center;
        }

        .leaderboard-column table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }

        .leaderboard-column th {
            text-align: left;
            color: #94a3b8;
            padding: 4px 6px;
            border-bottom: 1px solid #334155;
            font-weight: 600;
        }

        .leaderboard-column td {
            padding: 4px 6px;
            border-bottom: 1px solid #1e293b;
        }

        .leaderboard-column .highlight {
            background: rgba(251, 191, 36, 0.1);
        }

        .leaderboard-column .rank { color: #64748b; width: 20px; }
        .leaderboard-column .login { color: #e2e8f0; }
        .leaderboard-column .num { color: #94a3b8; text-align: center; }
        .leaderboard-column .wins { color: #4ade80; }
        .leaderboard-column .losses { color: #f87171; }
        .leaderboard-column .draws { color: #fbbf24; }

        h1 {
            font-size: 1.25rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .auth-section {
            margin-bottom: 10px;
            text-align: center;
            min-height: 36px;
        }

        .auth-section input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #334155;
            color: #fff;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            width: 110px;
            margin: 0 3px;
        }

        .auth-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-section button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 5px 12px;
            font-size: 0.7rem;
            border-radius: 6px;
            cursor: pointer;
            margin: 0 2px;
            transition: transform 0.2s;
        }

        .auth-section button:hover {
            transform: translateY(-1px);
        }

        .auth-section .user-info {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .auth-section .user-info span {
            color: #4ade80;
        }

        .auth-section .logout-btn {
            background: #475569;
            margin-left: 8px;
        }

        .auth-section .auth-error {
            color: #f87171;
            font-size: 0.7rem;
            margin-top: 4px;
        }

        .game-container {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 3px;
            margin-bottom: 10px;
        }

        .cell {
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 6px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cell:hover:not(.taken) {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.x {
            color: #4ade80;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        .cell.o {
            color: #f87171;
            text-shadow: 0 0 10px rgba(248, 113, 113, 0.5);
        }

        .status {
            font-size: 0.65rem;
            text-align: center;
            margin-bottom: 10px;
            min-height: 16px;
        }

        .status.win { color: #4ade80; }
        .status.lose { color: #f87171; }
        .status.draw { color: #fbbf24; }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: 0.5rem;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; align-items: center; }
            .leaderboard-column { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-column">
            <div class="auth-section" id="authSection">
                <div id="authForm">
                    <input type="text" id="loginInput" placeholder="Login" maxlength="20">
                    <input type="password" id="passwordInput" placeholder="Password">
                    <button id="loginBtn">Login</button>
                    <button id="registerBtn">Register</button>
                </div>
                <div id="userInfo" style="display:none">
                    <span class="user-info">Playing as: <span id="displayName"></span></span>
                    <button class="logout-btn" id="logoutBtn">Logout</button>
                </div>
                <div class="auth-error" id="authError"></div>
            </div>

            <h1>Tic-Tac-Toe</h1>

            <div class="game-container">
                <div class="status" id="status">Please login to play</div>

                <div class="board" id="board">
                    <button class="cell" data-index="0"></button>
                    <button class="cell" data-index="1"></button>
                    <button class="cell" data-index="2"></button>
                    <button class="cell" data-index="3"></button>
                    <button class="cell" data-index="4"></button>
                    <button class="cell" data-index="5"></button>
                    <button class="cell" data-index="6"></button>
                    <button class="cell" data-index="7"></button>
                    <button class="cell" data-index="8"></button>
                </div>

                <button id="newGameBtn" disabled>New Game</button>
            </div>
        </div>

        <div class="leaderboard-column">
            <h2>&#127942; Leaderboard</h2>
            <table>
                <thead>
                    <tr>
                        <th class="rank">#</th>
                        <th class="login">Player</th>
                        <th class="num wins">W</th>
                        <th class="num losses">L</th>
                        <th class="num draws">D</th>
                        <th class="num">T</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr><td colspan="6" style="text-align:center;color:#64748b;font-size:0.7rem">No games played yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const base = window.location.pathname.replace(/\/$/, '');
        const API_URL = base + '/api/game';
        const AUTH_URL = base + '/api/auth';
        const STATS_URL = base + '/api/stats';

        const TOKEN_KEY = 'tictac_token';
        const LOGIN_KEY = 'tictac_login';

        let gameId = null;
        let currentBoard = null;
        let isProcessing = false;
        let token = localStorage.getItem(TOKEN_KEY);
        let currentLogin = localStorage.getItem(LOGIN_KEY);

        const statusEl = document.getElementById('status');
        const newGameBtn = document.getElementById('newGameBtn');
        const cells = document.querySelectorAll('.cell');
        const authForm = document.getElementById('authForm');
        const userInfo = document.getElementById('userInfo');
        const displayName = document.getElementById('displayName');
        const loginInput = document.getElementById('loginInput');
        const passwordInput = document.getElementById('passwordInput');
        const authError = document.getElementById('authError');

        function showError(msg) {
            authError.textContent = msg;
            setTimeout(() => authError.textContent = '', 3000);
        }

        function updateAuthUI() {
            if (token && currentLogin) {
                authForm.style.display = 'none';
                userInfo.style.display = 'block';
                displayName.textContent = currentLogin;
                newGameBtn.disabled = false;
                statusEl.textContent = 'Click "New Game" or a cell to start!';
            } else {
                authForm.style.display = 'block';
                userInfo.style.display = 'none';
                newGameBtn.disabled = true;
                statusEl.textContent = 'Please login to play';
            }
        }

        async function apiFetch(url, options = {}) {
            const headers = options.headers || {};
            if (token) {
                headers['Authorization'] = 'Basic ' + token;
            }
            if (options.body && !(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }
            return fetch(url, { ...options, headers });
        }

        async function handleAuth(mode) {
            const login = loginInput.value.trim();
            const password = passwordInput.value;

            if (!login || !password) {
                showError('Enter login and password');
                return;
            }

            try {
                let response;
                if (mode === 'register') {
                    response = await apiFetch(`${AUTH_URL}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ login, password })
                    });
                    if (!response.ok) {
                        const err = await response.json().catch(() => ({ error: 'Registration failed' }));
                        showError(err.error || 'Registration failed');
                        return;
                    }
                }

                const authHeader = btoa(login + ':' + password);
                response = await fetch(`${AUTH_URL}/login`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Basic ' + authHeader }
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({ error: 'Login failed' }));
                    showError(err.error || 'Invalid credentials');
                    return;
                }

                const user = await response.json();
                token = authHeader;
                currentLogin = user.login;
                localStorage.setItem(TOKEN_KEY, token);
                localStorage.setItem(LOGIN_KEY, currentLogin);
                loginInput.value = '';
                passwordInput.value = '';
                updateAuthUI();
                loadLeaderboard();
                newGame();
            } catch (err) {
                showError('Network error');
                console.error(err);
            }
        }

        function logout() {
            token = null;
            currentLogin = null;
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(LOGIN_KEY);
            gameId = null;
            currentBoard = null;
            isProcessing = false;
            updateAuthUI();
            renderBoard([[0,0,0],[0,0,0],[0,0,0]]);
            loadLeaderboard();
        }

        document.getElementById('loginBtn').addEventListener('click', () => handleAuth('login'));
        document.getElementById('registerBtn').addEventListener('click', () => handleAuth('register'));
        loginInput.addEventListener('keydown', e => { if (e.key === 'Enter') passwordInput.focus(); });
        passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth('login'); });
        document.getElementById('logoutBtn').addEventListener('click', logout);

        function indexToCoords(index) {
            return { row: Math.floor(index / 3), col: index % 3 };
        }

        function renderBoard(board) {
            cells.forEach((cell, index) => {
                const { row, col } = indexToCoords(index);
                const value = board[row][col];
                cell.textContent = value === 1 ? 'X' : value === 2 ? 'O' : '';
                cell.classList.remove('x', 'o', 'taken');
                if (value !== 0) {
                    cell.classList.add('taken', value === 1 ? 'x' : 'o');
                }
            });
        }

        function renderStatus(message, type = '') {
            statusEl.textContent = message;
            statusEl.classList.remove('win', 'lose', 'draw');
            if (type) statusEl.classList.add(type);
        }

        async function newGame() {
            if (isProcessing || !token) return;

            isProcessing = true;
            newGameBtn.disabled = true;
            renderStatus('Creating game...');

            try {
                const response = await apiFetch(API_URL);
                if (response.status === 401) { logout(); return; }
                if (!response.ok) throw new Error('Failed to create game');

                const game = await response.json();
                gameId = game.id;
                currentBoard = game.board.board;
                renderBoard(currentBoard);
                renderStatus('Your turn! Click a cell to place X');

            } catch (error) {
                renderStatus('Error: ' + error.message);
                console.error(error);
            } finally {
                isProcessing = false;
                newGameBtn.disabled = false;
            }
        }

        async function recordResult(result) {
            try {
                const res = await apiFetch(`${STATS_URL}/record`, {
                    method: 'POST',
                    body: JSON.stringify({ result })
                });
                if (res.status === 401) { logout(); return; }
                if (!res.ok) {
                    const err = await res.json().catch(() => ({ error: 'Failed to save result' }));
                    renderStatus('Error: ' + (err.error || 'save failed'));
                    return;
                }
                loadLeaderboard();
            } catch (err) {
                renderStatus('Error saving result');
                console.error(err);
            }
        }

        async function makeMove(index) {
            if (isProcessing || !gameId || !token) return;

            const { row, col } = indexToCoords(index);
            if (currentBoard[row][col] !== 0) return;

            isProcessing = true;
            newGameBtn.disabled = true;
            renderStatus('Computer thinking...');

            try {
                currentBoard[row][col] = 1;

                const moveDto = {
                    id: gameId,
                    board: { board: currentBoard, size: 3 },
                    isOver: false,
                    winner: 0,
                    message: null
                };

                const response = await apiFetch(`${API_URL}/${gameId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(moveDto)
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({ error: 'Unknown error' }));
                    throw new Error(error.error || 'Move failed');
                }

                const game = await response.json();
                currentBoard = game.board.board;
                renderBoard(currentBoard);

                if (game.isOver) {
                    gameId = null;
                    if (game.winner === 1) {
                        renderStatus(game.message, 'win');
                        recordResult(1);
                    } else if (game.winner === 2) {
                        renderStatus(game.message, 'lose');
                        recordResult(-1);
                    } else {
                        renderStatus(game.message, 'draw');
                        recordResult(0);
                    }
                    statusEl.textContent += ' Press "New Game" to play again';
                } else {
                    renderStatus('Your turn! Click a cell to place X');
                }

            } catch (error) {
                if (currentBoard) {
                    currentBoard[row][col] = 0;
                    renderBoard(currentBoard);
                }
                renderStatus('Error: ' + error.message);
            } finally {
                isProcessing = false;
                newGameBtn.disabled = false;
            }
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch(`${STATS_URL}/leaderboard`);
                if (!response.ok) return;
                const data = await response.json();
                const tbody = document.getElementById('leaderboardBody');

                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#64748b;font-size:0.7rem">No games played yet</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map((entry, i) => {
                    const highlight = currentLogin && entry.login === currentLogin ? ' class="highlight"' : '';
                    return `<tr${highlight}>
                        <td class="rank">${i + 1}</td>
                        <td class="login">${escapeHtml(entry.login)}</td>
                        <td class="num wins">${entry.wins}</td>
                        <td class="num losses">${entry.losses}</td>
                        <td class="num draws">${entry.draws}</td>
                        <td class="num">${entry.total}</td>
                    </tr>`;
                }).join('');
            } catch (err) {
                console.error('Failed to load leaderboard:', err);
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        newGameBtn.addEventListener('click', newGame);
        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => makeMove(index));
        });

        updateAuthUI();
        (async () => {
            try {
                const res = await fetch('/api/auth/session');
                if (!res.ok) return;
                const session = await res.json();
                if (!session?.user?.name) return;
                const linkRes = await fetch(`${AUTH_URL}/auto-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: session.user.name })
                });
                if (!linkRes.ok) return;
                const user = await linkRes.json();
                token = btoa(user.login + ':');
                currentLogin = user.login;
                localStorage.setItem(TOKEN_KEY, token);
                localStorage.setItem(LOGIN_KEY, currentLogin);
                updateAuthUI();
                newGame();
            } catch (e) {
                // Not logged into main site — fall through to login form
            }
            if (token) { newGame(); }
            loadLeaderboard();
        })();
    </script>
</body>
</html>
