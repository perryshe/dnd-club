services:
  db:
    image: postgres:16-alpine
    container_name: dnd-club-db
    restart: always
    environment:
      POSTGRES_USER: dndclub
      POSTGRES_PASSWORD: dndclub_pass
      POSTGRES_DB: dndclub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dndclub"]
      interval: 5s
      timeout: 5s
      retries: 5

  club:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dnd-club
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=postgresql://dndclub:dndclub_pass@db:5432/dndclub
      - NEXTAUTH_SECRET=change-me-to-a-random-secret
      - NEXTAUTH_URL=https://d21-club.ru
      - ADMIN_EMAIL=admin@dnd-club.ru
      - ADMIN_PASSWORD=admin123
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
