<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регламентные работы — d21 Club</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f0f1a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}
.wrap { max-width: 480px; }
.icon { font-size: 64px; margin-bottom: 20px; }
h1 {
  font-size: 1.5rem;
  margin-bottom: 12px;
  color: #fbbf24;
}
p { font-size: 0.95rem; color: #94a3b8; margin-bottom: 24px; line-height: 1.6; }
.btn {
  display: inline-block;
  background: #1e293b;
  color: #e2e8f0;
  border: 1px solid #334155;
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background .2s;
}
.btn:hover { background: #334155; }
.footer { margin-top: 48px; font-size: 0.75rem; color: #475569; }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">&#9888;</div>
  <h1>Ведутся регламентные работы</h1>
  <p>Сайт временно недоступен.<br>Мы обновляем инфраструктуру, чтобы стало лучше.<br>Workflow порядка 10 минут.</p>
  <button class="btn" onclick="location.reload()">&#x21bb;&nbsp; Обновить</button>
  <div class="footer">d21 Club &copy; 2026</div>
</div>
</body>
</html>
