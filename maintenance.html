<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регламентные работы — d21 Club</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f0f1a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}
.wrap { max-width: 480px; }
.icon { font-size: 64px; margin-bottom: 20px; }
h1 {
  font-size: 1.5rem;
  margin-bottom: 12px;
  color: #fbbf24;
}
p { font-size: 0.95rem; color: #94a3b8; margin-bottom: 24px; line-height: 1.6; }
.timer {
  font-size: 3rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #fbbf24;
  margin-bottom: 8px;
  letter-spacing: 2px;
}
.timer-label { font-size: 0.8rem; color: #64748b; margin-bottom: 32px; }
.done { color: #4ade80; }
.btn {
  display: inline-block;
  background: #1e293b;
  color: #e2e8f0;
  border: 1px solid #334155;
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background .2s;
}
.btn:hover { background: #334155; }
.footer { margin-top: 48px; font-size: 0.75rem; color: #475569; }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">&#9888;</div>
  <h1>Ведутся регламентные работы</h1>
  <p>Сайт временно недоступен.<br>Мы обновляем инфраструктуру, чтобы стало лучше.</p>
  <div class="timer" id="timer">09:59</div>
  <div class="timer-label">Окончание запланировано через</div>
  <button class="btn" onclick="location.reload()">&#x21bb;&nbsp; Обновить</button>
  <div class="footer">d21 Club &copy; 2026</div>
</div>
<script>
(function() {
  var DURATION = 10 * 60; // 10 minutes in seconds
  var KEY = 'maint_end';
  var now = Math.floor(Date.now() / 1000);
  var end = parseInt(localStorage.getItem(KEY), 10);

  if (!end || end < now) {
    end = now + DURATION;
    localStorage.setItem(KEY, end);
  }

  var el = document.getElementById('timer');

  function tick() {
    var remaining = Math.max(0, end - Math.floor(Date.now() / 1000));
    var m = Math.floor(remaining / 60);
    var s = remaining % 60;
    el.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;

    if (remaining <= 0) {
      el.className = 'timer done';
      el.textContent = 'Работы завершены';
      document.querySelector('.timer-label').textContent = 'Скоро сайт будет доступен';
      localStorage.removeItem(KEY);
      return;
    }
    setTimeout(tick, 1000);
  }
  tick();
})();
</script>
</body>
</html>
