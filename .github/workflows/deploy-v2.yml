name: Deploy v2 (microservices)
on:
  push:
    branches: [refactor/split-services]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/club/Club
          git pull origin refactor/split-services
      - name: Full cleanup
        run: |
          cd /home/club/Club
          docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
          docker network rm club_default 2>/dev/null || true
          docker system prune -a --volumes -f
      - name: Build and start
        run: |
          cd /home/club/Club
          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d
      - name: Update nginx and reload
        run: |
          cp /home/club/Club/dnd-club-nginx.conf /home/club/dnd-club-nginx.conf
          sudo nginx -t && sudo systemctl reload nginx
