name: Deploy v2 (microservices)
on:
  push:
    branches: [refactor/split-services]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/club/Club
          git pull origin refactor/split-services
      - name: Build and start microservices
        run: |
          cd /home/club/Club
          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d
