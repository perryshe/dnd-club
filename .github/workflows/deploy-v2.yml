name: Deploy v2 (microservices)
on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths-ignore: ['*.md']

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/club/Club
          git fetch --force origin develop && git reset --hard origin/develop
      - name: Copy maintenance page
        run: |
          sudo cp /home/club/Club/maintenance.html /usr/share/nginx/html/maintenance.html
      - name: Enable maintenance mode
        run: |
          cd /home/club/Club
          sudo ./maintenance.sh on
      - name: Build app images
        run: |
          cd /home/club/Club
          docker compose -f docker-compose.prod.yml build dnd-club book-club quest t21-game
      - name: Restart app services (db untouched)
        run: |
          cd /home/club/Club
          docker compose -f docker-compose.prod.yml up -d
      - name: Sync Prisma schema
        run: |
          cd /home/club/Club
          for i in $(seq 1 30); do
            docker compose -f docker-compose.prod.yml exec -T dnd-club-db \
              sh -c "PGPASSWORD=dndclub_pass pg_isready -U dndclub -d dndclub" && break
            sleep 2
          done
          docker compose -f docker-compose.prod.yml exec -T dnd-club \
            npx prisma db push --accept-data-loss
          docker compose -f docker-compose.prod.yml restart dnd-club
      - name: Update nginx and reload
        run: |
          sudo cp /home/club/Club/dnd-club-nginx.conf /etc/nginx/sites-enabled/dnd-club
          sudo nginx -t && sudo systemctl reload nginx
      - name: Disable maintenance mode
        if: always()
        run: |
          cd /home/club/Club
          sudo ./maintenance.sh off
