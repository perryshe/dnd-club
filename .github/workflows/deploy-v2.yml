name: Deploy v2 (microservices)
on:
  push:
    branches: [refactor/split-services]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build and start microservices
        run: |
          cd /root/dnd-club-v2
          git pull origin refactor/split-services
          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d
